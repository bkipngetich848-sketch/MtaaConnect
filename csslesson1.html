<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Lesson1 </title>

    <style>
        /* using tag selector */
        p:hover{
            color: rgb(7, 216, 70);
            text-align: center;
            text-decoration:firebrick;
            text-transform: inherit;
            text-decoration-color: rgb(221, 174, 20);
            text-decoration-skip-ink: inherit;
            font-variant-numeric: diagonal-fractions;
            transform-style: flat;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; background-color: rgba(68, 3, 121, 0.767); text-decoration: underline; background-size: auto;
    ">Inline css</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. A ex tenetur ratione in earum. Perspiciatis similique quas ullam voluptatibus illo suscipit nemo ex fugiat eum! Illo delectus perspiciatis quam unde?</p>
</body>
</html>
